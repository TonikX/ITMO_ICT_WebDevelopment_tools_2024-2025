version: '3.8'

services:
  parser-service:
    build:
      context: ./parser-service
    ports:
      - "8001:8000"
    networks:
      - app-network

  main-service:
    build:
      context: ./main-service
    ports:
      - "8000:8000"
    depends_on:
      - db
      - parser-service
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:1234@db:5432/warriors_db
      - PARSER_SERVICE_URL=http://parser-service:8000/parse
      - SECRET_KEY=your_secret_key
      - ALGORITHM=HS256
      - CELERY_BROKER_URL=redis://redis:6379/0
    networks:
      - app-network

  celery-worker:
    build:
      context: ./main-service
    command: celery -A celery_worker.celery_app worker --loglevel=info
    depends_on:
      - redis
      - main-service
      - parser-service
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    networks:
      - app-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - app-network

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: warriors_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:

volumes:
  pgdata:
