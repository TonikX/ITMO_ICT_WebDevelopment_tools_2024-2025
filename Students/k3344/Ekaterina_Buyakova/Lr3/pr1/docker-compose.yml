services:
  parser:
    build:
      context: parser/.
    depends_on:
      db:
        condition: service_healthy
        restart: true
    ports:
      - ${PARSER_PORT}:${PARSER_PORT}
    env_file: ".env"

  db:
    image: postgres:17.5-alpine3.21
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 128m
    expose:
      - ${POSTGRES_PORT}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 10s

  app:
    build:
      context: app/.
    depends_on:
      db:
        condition: service_healthy
        restart: true
    ports:
      - ${APP_PORT}:${APP_PORT}
    env_file: ".env"
