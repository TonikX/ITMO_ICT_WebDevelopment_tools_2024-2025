version: '3.8'

services:
  # Основная база данных для приложения
  postgres:
    image: postgres:15
    container_name: book_exchange_db
    environment:
      POSTGRES_DB: book-crossing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - app-network

  # База данных для парсера
  parser_postgres:
    image: postgres:15
    container_name: parser_db
    environment:
      POSTGRES_DB: web_parsing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - parser_postgres_data:/var/lib/postgresql/data
      - ./init_parser_db.sql:/docker-entrypoint-initdb.d/init_parser_db.sql
    networks:
      - app-network

  # Основное FastAPI приложение
  app:
    build: .
    container_name: book_exchange_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/book-crossing
      - PARSER_DB_HOST=parser_postgres
      - PARSER_DB_NAME=web_parsing
      - PARSER_DB_USER=postgres
      - PARSER_DB_PASSWORD=postgres
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - postgres
      - parser_postgres
    volumes:
      - .:/app
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  parser_postgres_data:

networks:
  app-network:
    driver: bridge 