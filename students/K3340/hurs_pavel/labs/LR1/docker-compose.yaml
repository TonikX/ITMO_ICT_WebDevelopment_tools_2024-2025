version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/time_manager_db
      - REDIS_URL=redis://redis:6379/0
      - PARSER_URL=http://parser:8001
    depends_on:
      - db
      - redis
      - parser

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=time_manager_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A celery_worker.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/time_manager_db
      - REDIS_URL=redis://redis:6379/0
      - PARSER_URL=http://parser:8001
    depends_on:
      - redis
      - db
      - parser

  parser:
    build: 
      context: ../lab2/LR2/webpages
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/time_manager_db

volumes:
  postgres_data: