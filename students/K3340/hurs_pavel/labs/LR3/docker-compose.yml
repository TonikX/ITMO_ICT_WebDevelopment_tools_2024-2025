version: '3.8'

services:
  web:
    build: ./web_service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/time_manager_db
      - REDIS_URL=redis://redis:6379/0
      - PARSER_URL=http://parser:8001
    depends_on:
      - db
      - redis
      - parser
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  parser:
    build: ./parser_service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/time_manager_db
    depends_on:
      - db
    command: uvicorn parser_api:app --host 0.0.0.0 --port 8001

  celery_worker:
    build: ./web_service
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/time_manager_db
      - REDIS_URL=redis://redis:6379/0
      - PARSER_URL=http://parser:8001
    depends_on:
      - redis
      - parser
    command: celery -A celery_worker worker --loglevel=info

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=time_manager_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  postgres_data: