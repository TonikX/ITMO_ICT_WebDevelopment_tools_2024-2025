services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_TIME=postgresql://postgres:password@db:5432/time_db_copy
      - PARSER_SERVICE_URL=http://parser:8001
    depends_on:
      db:
        condition: service_healthy


  parser:
    build:
      context: ./parser
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DB_TIME=postgresql://postgres:password@db:5432/time_db_copy
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=time_db_copy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery:
      build:
        context: ./app
      command: celery -A celery_app worker --loglevel=info
      environment:
        - DB_TIME=postgresql://postgres:password@db:5432/time_db_copy
        - REDIS_URL=redis://redis:6379/0
        - PARSER_SERVICE_URL=http://parser:8001
        - PYTHONPATH=/app
      volumes:
        - ./app:/app
      depends_on:
        - redis
        - db
        - parser

volumes:
  postgres_data:
  redis_data: