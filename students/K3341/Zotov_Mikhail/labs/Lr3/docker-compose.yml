services:
  lab_1_api:
    build:
      context: ../Lr1
      dockerfile: Dockerfile
    restart: always
    container_name: lab_1_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - ../../.env

  lab_3_api:
    build:
      context: ../Lr3
      dockerfile: Dockerfile
    restart: always
    container_name: lab_3_api
    command: uvicorn Lr3.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8888:8000"
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "6666:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  lab_3_worker:
    build:
      context: ../Lr3
      dockerfile: Dockerfile
    restart: always
    container_name: lab_3_worker
    command: celery -A Lr3.tasks worker --loglevel=info
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"