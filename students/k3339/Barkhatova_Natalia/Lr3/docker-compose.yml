version: "3.9"

services:
  postgres_db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: nata
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: bookcrossing
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  fastapi_app:
    build:
      context: ./lr1
    depends_on:
      - postgres_db
    environment:
      DATABASE_URL: postgresql://nata:1@postgres_db:5432/bookcrossing
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  parser_app:
    build:
      context: ./parser
    depends_on:
      - postgres_db
    environment:
      DATABASE_URL: postgresql://nata:1@postgres_db:5432/bookcrossing
    ports:
      - "8001:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
  
  celery_worker:
    build:
      context: ./lr1
    container_name: celery_worker
    command: celery -A celery_app.celery worker --loglevel=info
    volumes:
      - ./lr1:/app
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
