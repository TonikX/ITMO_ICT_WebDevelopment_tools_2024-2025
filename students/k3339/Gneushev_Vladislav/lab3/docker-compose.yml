version: "3"

name: lab3-commercial_buses
services:
  api:
    restart: always
    env_file:
      - .env
    build: .
    volumes:
      - "./app:/app"
    ports:
      - "8080:8080"
    entrypoint:
      [ "python", "-m", "app" ]
    depends_on:
      - postgres
      - redis

  parser:
    build:
      context: .
      dockerfile: parser/Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: commercial_buses
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery_worker:
    restart: always
    env_file:
      - .env
    build: .
    volumes:
      - "./app:/app"
    command: celery -A app.celery.app worker --loglevel=info
    depends_on:
      - redis
      - postgres

  # celery_beat:
  #   restart: always
  #   env_file:
  #     - .env
  #   build: .
  #   volumes:
  #     - "./app:/app"
  #   command: celery -A app.celery.app beat --loglevel=info
  #   depends_on:
  #     - redis
  #     - postgres

volumes:
  postgres_data:
  redis_data:
