version: '3.8'

services:
  db:
    image: postgres:13
    container_name: finance_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: finance_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DB_ADMIN=postgresql://postgres:postgres@db:5432/finance_db

  parser:
    build: .
    container_name: finance_parser
    depends_on:
      - db
    command: ["python", "-m", "parser.app"]
    environment:
      - DB_ADMIN=postgresql://postgres:postgres@db:5432/finance_db

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery-worker:
    build: .
    command: celery -A celery_app worker --loglevel=info
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - redis

  celery-beat:
    build: .
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      - redis
      - db

  flower:
    build: .
    command: celery -A celery_app flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    working_dir: /app

volumes:
  postgres_data:
  redis_data: